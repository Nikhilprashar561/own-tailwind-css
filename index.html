<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chai CSS Demo</title>
</head>

<body class="chai-bg-blue chai-p-4 random-class">

  <!-- NAVBAR -->
  <nav class="chai-flex chai-flex-row chai-justify-between chai-items-center chai-p-4 chai-bg-red chai-p-4 duplicate">
    
    <h1 class="chai-text-white chai-font-bold chai-text-black">
      ChaiCSS
    </h1>

    <div class="chai-flex chai-gap-4 chai-gap-4">
      <a class="chai-text-red chai-cursor-pointer invalid-class">Home</a>
      <a class="chai-text-blue chai-cursor-pointer">About</a>
      <a class="chai-text-yellow chai-cursor-pointer">Contact</a>
    </div>

  </nav>

  <!-- HERO SECTION -->
  <section class="chai-flex chai-flex-col chai-items-center chai-justify-center chai-p-10 chai-bg-green chai-text-center wrong-class">

    <h2 class="chai-font-bold chai-text-white chai-mb-4 chai-mb-4">
      Build Your Own Tailwind 🚀
    </h2>

    <p class="chai-text-white chai-mb-6 chai-mb-6">
      Practice DOM traversal, class parsing, and dynamic styling.
    </p>

    <button class="chai-bg-red chai-text-white chai-p-2 chai-rounded-md chai-cursor-pointer chai-p-2 extra">
      Get Started
    </button>

  </section>

  <!-- CARD SECTION -->
  <section class="chai-grid chai-p-6 chai-gap-4 chai-bg-blue">

    <!-- CARD 1 -->
    <div class="chai-bg-white chai-p-4 chai-rounded-lg chai-p-4 chai-shadow invalid">
      <h3 class="chai-font-bold chai-mb-2 chai-text-black">
        Card 1
      </h3>
      <p class="chai-text-gray chai-mb-2">
        This is a sample card.
      </p>
      <button class="chai-bg-green chai-text-white chai-p-2 chai-rounded-sm chai-cursor-pointer">
        Click
      </button>
    </div>

    <!-- CARD 2 -->
    <div class="chai-bg-white chai-p-4 chai-rounded-lg chai-p-4">
      <h3 class="chai-font-bold chai-mb-2 chai-text-black">
        Card 2
      </h3>
      <p class="chai-text-gray chai-mb-2">
        Another example card.
      </p>
      <button class="chai-bg-red chai-text-white chai-p-2 chai-rounded-sm chai-cursor-pointer wrong">
        Click
      </button>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="chai-flex chai-justify-center chai-items-center chai-p-4 chai-bg-black chai-text-white chai-p-4 notchai">
    <p class="chai-text-white">
      © 2026 ChaiCSS Project
    </p>
  </footer>

  <script type="module" src="index.js"></script>
</body>
</html>
